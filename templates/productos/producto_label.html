<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Etiqueta {{ producto.codigo }}
    </title>

    <style>

        *{
            box-sizing: border-box;
        }

        body{

            font-family: Arial, sans-serif;

            background: #f5f5f5;

            padding: 20px;

        }

        .contenedor{

            width: 58mm;

            background: white;

            padding: 10px;

            border: 1px solid #ccc;

        }

        .logo{

            text-align: center;

            font-size: 16px;

            font-weight: bold;

            margin-bottom: 6px;

        }

        .nombre{

            text-align: center;

            font-size: 13px;

            font-weight: bold;

            margin-bottom: 8px;

            text-transform: uppercase;

        }

        .precio{

            text-align: center;

            font-size: 28px;

            font-weight: bold;

            margin-bottom: 8px;

        }

        .barcode{

            text-align: center;

            margin-bottom: 4px;

        }

        .barcode img{

            width: 100%;

            max-width: 220px;

        }

        .codigo{

            text-align: center;

            font-size: 12px;

            margin-bottom: 6px;

        }

        .fecha{

            text-align: center;

            font-size: 10px;

            color: #555;

        }

        .acciones{

            margin-top: 20px;

            display: flex;

            gap: 10px;

        }

        button{

            padding: 10px;

            border: none;

            cursor: pointer;

            background: black;

            color: white;

            border-radius: 4px;

        }

        @media print {

            body{

                background: white;

                padding: 0;

            }

            .acciones{

                display: none;

            }

            .contenedor{

                border: none;

            }

        }

    </style>

</head>

<body>

    <div class="contenedor">

        <!-- Logo -->

        <div class="logo">

            PuntoVentaPOS

        </div>

        <!-- Nombre -->

        <div class="nombre">

            {{ producto.nombre }}

        </div>

        <!-- Precio -->

        <div class="precio">

            S/ {{ producto.precio_venta }}

        </div>

        <!-- Barcode -->

        <div class="barcode">

            {% if producto.barcode_image %}

                <img src="{{ producto.barcode_image.url }}">

            {% endif %}

        </div>

        <!-- Código -->

        <div class="codigo">

            {{ producto.codigo }}

        </div>

        <!-- Fecha -->

        <div class="fecha">

            {{ now|date:"d/m/Y H:i" }}

        </div>

    </div>

    <div class="acciones">

        <button onclick="window.print()">

            🖨 Imprimir

        </button>

    </div>

</body>

</html>
