{% extends 'base/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-body">

            <h2 class="mb-4">
                Categoria de Gasto
            </h2>

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label>
                        Nombre
                    </label>

                    {{ form.nombre }}

                </div>

                <div class="mb-3 form-check">

                    {{ form.activo }}

                    <label class="form-check-label">
                        Activo
                    </label>

                </div>

                <button class="btn btn-primary">
                    Guardar
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
